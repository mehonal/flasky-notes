<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLI</title>
    <script nonce="{{ csp_nonce() }}" src="/static/js/csrf.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/cli.css') }}">
</head>

{% if g.user and g.user.encryption_enabled %}
<script nonce="{{ csp_nonce() }}" src="{{ url_for('static', filename='js/crypto.js') }}"></script>
<script nonce="{{ csp_nonce() }}" src="{{ url_for('static', filename='js/e2ee.js') }}"></script>
<script nonce="{{ csp_nonce() }}" src="{{ url_for('static', filename='js/e2ee-search.js') }}"></script>
{% endif %}

<body{% if g.user and g.user.encryption_enabled %} data-encrypted="true"{% endif %}>
    <div id="terminal">
        <div id="log"><div id="log-inner"></div></div>
        <div id="command-line">
            <span id="location">flasky/{{g.user.username}} $</span>
            <form id="command-form"><input id="command" type="text" autofocus></form>
        </div>
    </div>

    <div id="vim-overlay">
        <div id="vim-titlebar"></div>
        <textarea id="vim-content"></textarea>
        <div id="vim-statusline">
            <span id="vim-status-mode"></span>
            <span id="vim-status-msg"></span>
            <span id="vim-status-file"></span>
            <span id="vim-status-pos"></span>
        </div>
        <div id="vim-commandline">
            <span id="vim-cmd-prefix">:</span>
            <input id="vim-cmd-input" type="text" autocomplete="off">
        </div>
    </div>

    <div id="edit-overlay">
        <div id="edit-header"></div>
        <input id="edit-title" type="text" placeholder="Title">
        <textarea id="edit-content" placeholder="Content"></textarea>
        <div id="edit-buttons">
            <button id="btn-save">[ Save ]</button>
            <button id="btn-cancel">[ Cancel ]</button>
        </div>
        <div id="edit-footer">Ctrl+S to save | Escape to cancel</div>
    </div>

    <script nonce="{{ csp_nonce() }}" src="{{ url_for('static', filename='js/cli-vim.js') }}"></script>
    <script nonce="{{ csp_nonce() }}" src="{{ url_for('static', filename='js/cli-main.js') }}"></script>
    <script nonce="{{ csp_nonce() }}">
        CliMain.init({{ g.user.username | tojson }});
    </script>
</body>
</html>
