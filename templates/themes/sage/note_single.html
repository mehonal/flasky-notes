<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sage</title>
    <link rel="icon" type="image/x-icon" href="/static/images/amazing_logo.png">
    <link rel="apple-touch-icon" href="/static/images/amazing_logo.png" sizes="180x180">
    <link rel="manifest" href="/manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/2.0.3/marked.min.js"></script>
    <script src="{{ url_for('static', filename='js/wikilinks.js') }}"></script>
    <script src="{{ url_for('static', filename='js/markdown-extras.js') }}"></script>
    <script src="https://unpkg.com/turndown/dist/turndown.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/callouts.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        :root {
            --bg: #141e1e;
            --bg-secondary: #1a2a2a;
            --surface: #243636;
            --surface-hover: #2d4242;
            --surface-active: #365050;
            --border: #3a5454;
            --text: #d8ede4;
            --text-secondary: #8fb0a0;
            --text-faint: #5e8070;
            --accent: #5aab8b;
            --accent-hover: #4a9578;
            --accent-light: rgba(90, 171, 139, 0.15);
            --red: #e06060;
            --red-hover: #cc4c4c;
            --red-light: rgba(224, 96, 96, 0.12);
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.4);
            --radius: 10px;
            --radius-lg: 14px;
            --font-size: 16px;
        }

        body.light-mode {
            --bg: #eef5f0;
            --bg-secondary: #f6faf7;
            --surface: #ffffff;
            --surface-hover: #e8f0ea;
            --surface-active: #dce8de;
            --border: #c8d8cc;
            --text: #1e2e24;
            --text-secondary: #4a6a54;
            --text-faint: #7a9a84;
            --accent: #3d8b68;
            --accent-hover: #2e7555;
            --accent-light: rgba(61, 139, 104, 0.1);
            --red: #d04040;
            --red-light: rgba(208, 64, 64, 0.08);
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.1);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: {% if g.user.get_current_theme_font() %} {{ g.user.get_current_theme_font() }} {% else %}'Segoe UI', system-ui, -apple-system, sans-serif{% endif %};
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        ::-webkit-scrollbar { width: 7px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-faint); }

        /* Top bar */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 20;
            display: flex;
            align-items: center;
            padding: 10px 20px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            gap: 8px;
            backdrop-filter: blur(12px);
            background: rgba(26, 42, 42, 0.85);
        }

        body.light-mode .topbar {
            background: rgba(246, 250, 247, 0.85);
        }

        .topbar-brand {
            font-size: 16px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: -0.02em;
            margin-right: 4px;
        }

        .topbar-spacer { flex: 1; }

        .topbar-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
            text-decoration: none;
        }

        .topbar-btn:hover {
            background: var(--surface-hover);
            color: var(--text);
        }

        .topbar-btn.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        .topbar-btn.primary:hover {
            background: var(--accent-hover);
            border-color: var(--accent-hover);
        }

        .topbar-btn kbd {
            font-size: 10px;
            padding: 1px 5px;
            background: rgba(255,255,255,0.12);
            border-radius: 4px;
            font-family: inherit;
        }

        body.light-mode .topbar-btn kbd {
            background: rgba(0,0,0,0.07);
        }

        .save-status {
            font-size: 12px;
            color: var(--text-faint);
        }

        /* Container */
        .container {
            max-width: 760px;
            margin: 0 auto;
            padding: 24px 20px 60px;
        }

        /* Editor section */
        .editor-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 32px;
        }

        #note-title {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 26px;
            font-weight: 700;
            padding: 0 0 12px;
            outline: none;
            letter-spacing: -0.02em;
            font-family: inherit;
            border-bottom: 1px solid var(--border);
            margin-bottom: 16px;
        }

        #note-title::placeholder { color: var(--text-faint); }

        #note-content {
            width: 100%;
            min-height: 200px;
            background: transparent;
            border: none;
            color: var(--text);
            font-size: var(--font-size);
            line-height: 1.7;
            padding: 0;
            outline: none;
            resize: vertical;
            font-family: inherit;
        }

        #note-content::placeholder { color: var(--text-faint); }

        .editor-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 16px;
            padding-top: 14px;
            border-top: 1px solid var(--border);
        }

        .editor-actions .topbar-spacer { flex: 1; }

        .editor-category-select {
            padding: 5px 10px;
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 12px;
            cursor: pointer;
            outline: none;
        }
        .editor-category-select:hover { background: var(--surface-hover); }
        .editor-category-select option { background: var(--surface); color: var(--text); }

        .new-category-input {
            padding: 5px 10px;
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--accent);
            border-radius: var(--radius);
            font-size: 12px;
            outline: none;
            width: 140px;
        }

        /* Divider */
        .feed-divider {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 24px;
            color: var(--text-faint);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .feed-divider::before,
        .feed-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* Note feed */
        .note-feed {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .note-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px 24px;
            transition: all 0.2s ease;
        }

        .note-card:hover {
            border-color: var(--accent);
            box-shadow: var(--shadow);
            transform: translateY(-1px);
        }

        .note-card-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 10px;
            overflow-wrap: break-word;
            letter-spacing: -0.01em;
        }

        .note-card-content {
            overflow-wrap: break-word;
            font-size: var(--font-size);
            line-height: 1.7;
            color: var(--text-secondary);
        }

        .note-card-content h1 { font-size: 1.5em; margin: 0.5em 0 0.3em; color: var(--text); }
        .note-card-content h2 { font-size: 1.3em; margin: 0.4em 0 0.3em; color: var(--text); }
        .note-card-content h3 { font-size: 1.15em; margin: 0.3em 0 0.2em; color: var(--text); }
        .note-card-content h4 { font-size: 1.05em; margin: 0.3em 0 0.2em; color: var(--text); }
        .note-card-content h5 { font-size: 1em; margin: 0.2em 0; color: var(--text); }
        .note-card-content h6 { font-size: 0.9em; margin: 0.2em 0; color: var(--text-secondary); }
        .note-card-content p { margin: 0.4em 0; }
        .note-card-content ul, .note-card-content ol { padding-left: 1.5em; margin: 0.4em 0; }
        .note-card-content blockquote {
            border-left: 3px solid var(--accent);
            padding: 4px 14px;
            margin: 0.5em 0;
            color: var(--text-faint);
            background: var(--accent-light);
            border-radius: 0 var(--radius) var(--radius) 0;
        }
        .note-card-content a { color: var(--accent); }
        .note-card-content code {
            background: var(--surface);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.88em;
        }
        .note-card-content pre {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 12px;
            margin: 0.5em 0;
            overflow-x: auto;
        }
        .note-card-content pre code { background: none; padding: 0; }
        .note-card-content img { max-width: 100%; border-radius: var(--radius); }
        .note-card-content hr { border: none; border-top: 1px solid var(--border); margin: 0.8em 0; }
        .note-card-content table { width: 100%; border-collapse: collapse; margin: 0.4em 0; }
        .note-card-content th, .note-card-content td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
        .note-card-content th { background: var(--surface); font-weight: 600; color: var(--text); }

        .note-card-actions {
            display: flex;
            justify-content: flex-end;
            gap: 6px;
            margin-top: 14px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }

        .card-btn {
            padding: 5px 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
        }

        .card-btn:hover {
            background: var(--surface-hover);
            color: var(--text);
        }

        .card-btn.danger:hover {
            background: var(--red-light);
            border-color: var(--red);
            color: var(--red);
        }

        /* Category filter tabs */
        .category-tabs {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 20px;
            background: var(--bg);
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .category-tabs::-webkit-scrollbar { display: none; }

        .category-tab {
            padding: 5px 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .category-tab:hover {
            background: var(--surface-hover);
            color: var(--text);
        }

        .category-tab.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        /* Load more */
        #load-more-btn {
            width: 100%;
            padding: 14px;
            background: var(--surface);
            border: 1px dashed var(--border);
            border-radius: var(--radius-lg);
            color: var(--text-faint);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            margin-top: 4px;
        }

        #load-more-btn:hover {
            background: var(--accent-light);
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Search modal */
        .search-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 100;
        }

        .search-overlay.active {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 15vh;
        }

        .search-modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            width: 90%;
            max-width: 480px;
            box-shadow: var(--shadow-lg);
            animation: slideDown 0.15s ease;
            overflow: hidden;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .search-input-wrapper {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            gap: 10px;
            border-bottom: 1px solid var(--border);
        }

        .search-input-wrapper .search-icon {
            color: var(--text-faint);
            font-size: 16px;
            flex-shrink: 0;
        }

        #search-input {
            flex: 1;
            background: none;
            border: none;
            color: var(--text);
            font-size: 15px;
            outline: none;
            font-family: inherit;
        }

        #search-input::placeholder { color: var(--text-faint); }

        #search-results {
            max-height: 300px;
            overflow-y: auto;
        }

        .search-result {
            padding: 10px 16px;
            cursor: pointer;
            transition: background 0.1s;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .search-result:hover,
        .search-result.selected {
            background: var(--surface);
            color: var(--text);
        }

        .search-empty {
            padding: 20px 16px;
            text-align: center;
            color: var(--text-faint);
            font-size: 13px;
        }

        /* Mobile */
        @media (max-width: 480px) {
            .container {
                padding: 16px 12px 40px;
            }

            .editor-card {
                padding: 16px;
            }

            #note-title {
                font-size: 20px;
            }

            #note-content {
                min-height: 150px;
            }

            .note-card {
                padding: 14px 16px;
            }

            .note-card-title {
                font-size: 17px;
            }

            .topbar {
                padding: 8px 12px;
            }

            .topbar-btn .btn-text {
                display: none;
            }

            .topbar-btn kbd {
                display: none;
            }

            .topbar-brand {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <!-- Search overlay -->
    <div class="search-overlay" id="search-overlay">
        <div class="search-modal">
            <div class="search-input-wrapper">
                <span class="search-icon">&#128269;</span>
                <input type="text" id="search-input" placeholder="Search notes...">
            </div>
            <div id="search-results"></div>
        </div>
    </div>

    <!-- Top bar -->
    <div class="topbar">
        <span class="topbar-brand">Sage</span>
        <button class="topbar-btn" id="toggle-light" title="Toggle light mode">&#9788; <span class="btn-text">Light</span></button>
        <button class="topbar-btn" id="increase-font" title="Increase font">A+</button>
        <button class="topbar-btn" id="decrease-font" title="Decrease font">A-</button>
        <div class="topbar-spacer"></div>
        <button class="topbar-btn" id="toolbar-search" title="Search notes">&#128269; <kbd>Ctrl+K</kbd></button>
        <button class="topbar-btn" id="auto-save-btn" title="Auto-save"><span id="autosave-icon">&#9208;</span> <span class="btn-text">Auto</span></button>
        <a href="/agenda" class="topbar-btn">&#128197; <span class="btn-text">Agenda</span></a>
        <a href="/settings" class="topbar-btn">&#9881; <span class="btn-text">Settings</span></a>
    </div>

    <!-- Category filter tabs -->
    <div class="category-tabs">
        <button class="category-tab active" data-filter="">All</button>
        {% for cat in g.user.categories | sort(attribute='name') %}
        <button class="category-tab" data-filter="{{ cat.name }}">{{ cat.name }}</button>
        {% endfor %}
    </div>

    <!-- Main scrollable content -->
    <div class="container">
        <!-- Editor -->
        <div class="editor-card" data-note-id="{{ note_id }}">
            <input type="text" id="note-title" placeholder="Untitled">
            <textarea id="note-content" placeholder="Start writing..."></textarea>
            <div class="editor-actions">
                <select class="editor-category-select" id="note-category" onchange="onCategoryChange(this)">
                    <option value="">No Category</option>
                    {% for cat in g.user.categories | sort(attribute='name') %}
                    <option value="{{ cat.name }}">{{ cat.name }}</option>
                    {% endfor %}
                    <option value="__new__">+ New Category</option>
                </select>
                <input type="text" class="new-category-input" id="new-category-input" placeholder="Category name..." style="display:none" onkeydown="if(event.key==='Enter'){confirmNewCategory();event.preventDefault()}" onblur="confirmNewCategory()">
                <button class="topbar-btn primary" id="save-note">
                    <span id="save-icon">&#128190;</span>
                    <span class="btn-text">Save</span>
                    <kbd>Ctrl+S</kbd>
                </button>
                <span class="save-status" id="save-status"></span>
            </div>
        </div>

        <!-- Note feed -->
        <div class="feed-divider">Your Notes</div>
        <div class="note-feed" id="note-feed">
            {% for note in g.user.return_notes(5) %}
            <div class="note-card" id="note-{{ note.id }}-container" data-note-id="{{ note.id }}" data-category="{{ note.category.name if note.category else '' }}" data-raw-content="{{ note.content|e }}">
                <h2 class="note-card-title">{{ note.title }}</h2>
                {% include "partials/note_properties.html" %}
                <div class="note-card-content">{{ note.content }}</div>
                <div class="note-card-actions">
                    <button class="card-btn edit-note">Edit</button>
                    <button class="card-btn danger delete-note">Delete</button>
                </div>
            </div>
            {% endfor %}
            <button id="load-more-btn">Load More</button>
        </div>
    </div>

    <script>
        var page = 2;
        var autoSaveInterval;

        var turndownService = new TurndownService({
            headingStyle: 'atx',
            bulletListMarker: '-',
            hr: '---'
        });

        // Theme settings
        {% if g.user.get_theme_settings().dark_mode %}
        document.body.classList.add('light-mode');
        {% endif %}

        // Font size
        if (window.innerWidth < 480) {
            document.documentElement.style.setProperty('--font-size', '{{ g.user.get_theme_settings().mobile_font_size }}px');
        } else {
            document.documentElement.style.setProperty('--font-size', '{{ g.user.get_theme_settings().font_size }}px');
        }

        // Auto-save with debounce
        var autoSaveTimer = null;
        function setupAutoSaveDebounce() {
            var textarea = document.getElementById('note-content');
            var titleInput = document.getElementById('note-title');
            function onContentChange() {
                var nid = document.querySelector('.editor-card') ? document.querySelector('.editor-card').dataset.noteId : '0';
                if (nid === '0') return;
                clearTimeout(autoSaveTimer);
                autoSaveTimer = setTimeout(function() {
                    document.getElementById('save-note').click();
                }, 3000);
            }
            textarea.addEventListener('input', onContentChange);
            titleInput.addEventListener('input', onContentChange);
        }
        {% if g.user.get_theme_settings().auto_save %}
        document.getElementById('auto-save-btn').classList.add('active');
        setupAutoSaveDebounce();
        document.getElementById('autosave-icon').innerHTML = '&#10227;';
        {% endif %}

        // Render markdown in feed
        function renderMarkdown() {
            document.querySelectorAll('.note-card-content:not(.formatted)').forEach(el => {
                el.innerHTML = FlaskyMarkdown.processCallouts(marked(el.textContent));
                el.classList.add('formatted');
            });
            hljs.highlightAll();
        }

        // Load more notes
        document.getElementById('load-more-btn').addEventListener('click', () => {
            fetch('/api/load_notes', {
                method: 'POST',
                body: JSON.stringify({ page: page }),
                headers: { 'Content-Type': 'application/json' }
            })
            .then(r => r.json())
            .then(data => {
                const feed = document.getElementById('note-feed');
                data.forEach(note => {
                    const card = document.createElement('div');
                    card.className = 'note-card';
                    card.dataset.noteId = note.id;
                    card.dataset.category = note.category || '';
                    card.dataset.rawContent = note.content || '';
                    card.id = `note-${note.id}-container`;
                    card.innerHTML = `
                        <h2 class="note-card-title">${note.title}</h2>
                        <div class="note-card-content">${note.content}</div>
                        <div class="note-card-actions">
                            <button class="card-btn edit-note">Edit</button>
                            <button class="card-btn danger delete-note">Delete</button>
                        </div>
                    `;
                    feed.appendChild(card);
                    applyCategoryFilter(card);
                });
                page++;
                renderMarkdown();
                feed.appendChild(document.getElementById('load-more-btn'));
            });
        });

        // Light mode toggle
        document.getElementById('toggle-light').addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode') ? 1 : 0;
            fetch('/api/save_dark_mode/' + isLight);
        });

        // Font size
        document.getElementById('increase-font').addEventListener('click', () => {
            let fs = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--font-size'));
            fs += 2;
            document.documentElement.style.setProperty('--font-size', fs + 'px');
            const endpoint = window.innerWidth < 480 ? '/api/save_mobile_font_size/' : '/api/save_font_size/';
            fetch(endpoint + fs);
        });

        document.getElementById('decrease-font').addEventListener('click', () => {
            let fs = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--font-size'));
            if (fs > 8) {
                fs -= 2;
                document.documentElement.style.setProperty('--font-size', fs + 'px');
                const endpoint = window.innerWidth < 480 ? '/api/save_mobile_font_size/' : '/api/save_font_size/';
                fetch(endpoint + fs);
            }
        });

        // Auto-save toggle
        document.getElementById('auto-save-btn').addEventListener('click', () => {
            const btn = document.getElementById('auto-save-btn');
            const icon = document.getElementById('autosave-icon');
            if (btn.classList.contains('active')) {
                btn.classList.remove('active');
                clearTimeout(autoSaveTimer);
                icon.innerHTML = '&#9208;';
                fetch('/api/save_auto_save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ autoSave: 0 })
                });
            } else {
                btn.classList.add('active');
                icon.innerHTML = '&#10227;';
                setupAutoSaveDebounce();
                fetch('/api/save_auto_save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ autoSave: 1 })
                });
            }
        });

        // New category handling
        function onCategoryChange(sel) {
            if (sel.value === '__new__') {
                sel.style.display = 'none';
                var input = document.getElementById('new-category-input');
                input.style.display = '';
                input.value = '';
                input.focus();
            }
        }

        function confirmNewCategory() {
            var input = document.getElementById('new-category-input');
            var sel = document.getElementById('note-category');
            var name = input.value.trim();
            if (name) {
                // Add the new option and select it
                var opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                sel.insertBefore(opt, sel.querySelector('option[value="__new__"]'));
                sel.value = name;
            } else {
                sel.value = '';
            }
            input.style.display = 'none';
            sel.style.display = '';
        }

        // Save note
        document.getElementById('save-note').addEventListener('click', () => {
            const icon = document.getElementById('save-icon');
            const status = document.getElementById('save-status');
            const rawContent = document.getElementById('note-content').value;
            const renderedContent = FlaskyMarkdown.processCallouts(marked(rawContent));
            const noteTitle = document.getElementById('note-title').value;
            const noteId = document.querySelector('.editor-card').dataset.noteId;

            if (!renderedContent.trim()) return;

            icon.innerHTML = '&#8987;';
            status.textContent = 'Saving...';
            fetch('/api/save_note', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ noteId: noteId, title: noteTitle, content: rawContent, category: (function(){ var v = document.getElementById('note-category').value; return (v && v !== '__new__') ? v : null; })() })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    icon.innerHTML = '&#10003;';
                    status.textContent = 'Saved';

                    // Add/update card in feed
                    const existingCard = document.getElementById(`note-${data.note.id}-container`);
                    var selectedCategory = document.getElementById('note-category').value || '';
                    if (existingCard) {
                        existingCard.querySelector('.note-card-title').textContent = noteTitle;
                        existingCard.dataset.rawContent = rawContent;
                        existingCard.dataset.category = selectedCategory;
                        const contentEl = existingCard.querySelector('.note-card-content');
                        contentEl.innerHTML = renderedContent;
                        contentEl.classList.add('formatted');
                    } else {
                        const card = document.createElement('div');
                        card.className = 'note-card';
                        card.dataset.noteId = data.note.id;
                        card.dataset.rawContent = rawContent;
                        card.dataset.category = selectedCategory;
                        card.id = `note-${data.note.id}-container`;
                        card.innerHTML = `
                            <h2 class="note-card-title">${noteTitle}</h2>
                            <div class="note-card-content formatted"></div>
                            <div class="note-card-actions">
                                <button class="card-btn edit-note">Edit</button>
                                <button class="card-btn danger delete-note">Delete</button>
                            </div>
                        `;
                        card.querySelector('.note-card-content').innerHTML = renderedContent;
                        document.getElementById('note-feed').prepend(card);
                        document.getElementById('note-content').value = '';
                        document.getElementById('note-title').value = '';
                        document.querySelector('.editor-card').dataset.noteId = '0';
                    }
                    hljs.highlightAll();
                } else {
                    icon.innerHTML = '&#10007;';
                    status.textContent = 'Error';
                }
                setTimeout(() => {
                    icon.innerHTML = '&#128190;';
                    status.textContent = '';
                }, 2500);
            });
        });

        // Edit and Delete via event delegation
        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('delete-note')) {
                const card = e.target.closest('.note-card');
                if (!confirm('Delete this note?')) return;
                fetch('/api/delete_note', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ noteId: card.dataset.noteId })
                });
                card.remove();
            } else if (e.target.classList.contains('edit-note')) {
                const card = e.target.closest('.note-card');
                const rawContent = card.dataset.rawContent || '';
                const title = card.querySelector('.note-card-title').textContent;
                document.getElementById('note-content').value = rawContent;
                document.getElementById('note-title').value = title;
                document.getElementById('note-category').value = card.dataset.category || '';
                document.querySelector('.editor-card').dataset.noteId = card.dataset.noteId;
                card.remove();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        });

        // Ctrl+S save
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 's') {
                e.preventDefault();
                document.getElementById('save-note').click();
            }
        });

        // Search
        let selectedIndex = -1;
        const searchOverlay = document.getElementById('search-overlay');
        const searchInput = document.getElementById('search-input');
        const searchResults = document.getElementById('search-results');

        function openSearch() {
            searchOverlay.classList.add('active');
            searchInput.value = '';
            searchInput.focus();
            selectedIndex = -1;
            searchResults.innerHTML = '';
        }

        function closeSearch() {
            searchOverlay.classList.remove('active');
            searchInput.value = '';
            searchResults.innerHTML = '';
            selectedIndex = -1;
        }

        document.getElementById('toolbar-search').addEventListener('click', openSearch);

        searchOverlay.addEventListener('click', (e) => {
            if (e.target === searchOverlay) closeSearch();
        });

        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key.toLowerCase() === 'k') {
                e.preventDefault();
                openSearch();
            } else if (e.key === 'Escape' && searchOverlay.classList.contains('active')) {
                closeSearch();
            } else if (searchOverlay.classList.contains('active')) {
                const results = searchResults.children;
                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    selectedIndex = Math.min(selectedIndex + 1, results.length - 1);
                    updateSearchSelection();
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    selectedIndex = Math.max(selectedIndex - 1, -1);
                    updateSearchSelection();
                } else if (e.key === 'Enter' && selectedIndex >= 0) {
                    e.preventDefault();
                    results[selectedIndex].click();
                }
            }
        });

        function updateSearchSelection() {
            const results = searchResults.children;
            for (let i = 0; i < results.length; i++) {
                results[i].classList.toggle('selected', i === selectedIndex);
            }
        }

        let searchTimeout;
        searchInput.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            const query = e.target.value.trim();
            if (!query) { searchResults.innerHTML = ''; return; }
            searchTimeout = setTimeout(async () => {
                try {
                    const res = await fetch('/api/search_notes', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ query })
                    });
                    const notes = await res.json();
                    searchResults.innerHTML = '';
                    selectedIndex = -1;
                    if (notes.length === 0) {
                        searchResults.innerHTML = '<div class="search-empty">No results found</div>';
                        return;
                    }
                    notes.forEach((note, i) => {
                        const div = document.createElement('div');
                        div.className = 'search-result';
                        div.textContent = note.title;
                        div.addEventListener('mouseover', () => { selectedIndex = i; updateSearchSelection(); });
                        div.addEventListener('click', () => { window.open('/note/' + note.id, '_blank'); });
                        searchResults.appendChild(div);
                    });
                } catch (err) {
                    searchResults.innerHTML = '<div class="search-empty">Error searching</div>';
                }
            }, 250);
        });

        // Category filter
        var activeFilter = '';

        function applyCategoryFilter(card) {
            if (!activeFilter) {
                card.style.display = '';
            } else {
                card.style.display = (card.dataset.category === activeFilter) ? '' : 'none';
            }
        }

        function filterByCategory(filterName) {
            activeFilter = filterName;
            document.querySelectorAll('.category-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.filter === filterName);
            });
            document.querySelectorAll('.note-card').forEach(applyCategoryFilter);
        }

        document.querySelectorAll('.category-tab').forEach(tab => {
            tab.addEventListener('click', () => filterByCategory(tab.dataset.filter));
        });

        // Render on load
        document.addEventListener('DOMContentLoaded', renderMarkdown);
    </script>
</body>
</html>
