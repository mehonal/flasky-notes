                <div class="right-panel {% if theme_settings and not theme_settings.right_panel_collapsed %}{% else %}collapsed{% endif %}" id="right-panel">
                    <div class="right-panel-top-bar">
                        <div class="right-panel-close" data-action="toggle-right-panel">
                            <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                        </div>
                        <span class="right-panel-top-spacer"></span>
                        <button class="icon-btn right-panel-config-btn" data-action="toggle-widget-config" title="Configure widgets">
                            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                        </button>
                    </div>

                    <!-- Widget config panel (hidden by default) -->
                    <div class="widget-config-panel" id="widget-config-panel">
                        <div class="widget-config-header">Widgets</div>
                        <div class="widget-config-list" id="widget-config-list"></div>
                    </div>

                    <div class="right-panel-section" id="right-panel-widgets">
                        <!-- Outline widget -->
                        <div class="panel-widget" data-widget-id="outline" id="widget-outline">
                            <div class="right-panel-section-header widget-header" data-action="toggle-widget-collapse" data-widget-id="outline">
                                <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="13" y2="6"/><line x1="3" y1="10" x2="9" y2="10"/><line x1="3" y1="14" x2="13" y2="14"/><line x1="3" y1="18" x2="9" y2="18"/></svg>
                                <span class="widget-label">Outline</span>
                                <svg class="widget-chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
                            </div>
                            <div class="widget-body">
                                <ul class="outline-list" id="outline-list">
                                    <li class="outline-empty">No headings</li>
                                </ul>
                            </div>
                        </div>

                        <!-- Backlinks widget -->
                        <div class="panel-widget" data-widget-id="backlinks" id="widget-backlinks">
                            <div class="right-panel-section-header widget-header" data-action="toggle-widget-collapse" data-widget-id="backlinks">
                                <svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                                <span class="widget-label">Backlinks</span>
                                <svg class="widget-chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
                            </div>
                            <div class="widget-body">
                                <ul class="backlinks-list" id="backlinks-list">
                                    <li class="backlinks-empty">No backlinks</li>
                                </ul>
                            </div>
                        </div>

                        <!-- Outbound Links widget -->
                        <div class="panel-widget" data-widget-id="outbound_links" id="widget-outbound_links">
                            <div class="right-panel-section-header widget-header" data-action="toggle-widget-collapse" data-widget-id="outbound_links">
                                <svg viewBox="0 0 24 24"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>
                                <span class="widget-label">Outbound Links</span>
                                <svg class="widget-chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
                            </div>
                            <div class="widget-body">
                                <ul class="backlinks-list" id="outbound-links-list">
                                    <li class="backlinks-empty">No outbound links</li>
                                </ul>
                            </div>
                        </div>

                        <!-- Properties widget -->
                        <div class="panel-widget" data-widget-id="properties" id="widget-properties">
                            <div class="right-panel-section-header widget-header" data-action="toggle-widget-collapse" data-widget-id="properties">
                                <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
                                <span class="widget-label">Properties</span>
                                <svg class="widget-chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
                            </div>
                            <div class="widget-body">
                                <div class="right-panel-props" id="right-panel-props">
                                    <div class="outline-empty">No properties</div>
                                </div>
                            </div>
                        </div>

                        <!-- Todos widget -->
                        <div class="panel-widget" data-widget-id="todos" id="widget-todos">
                            <div class="right-panel-section-header widget-header" data-action="toggle-widget-collapse" data-widget-id="todos">
                                <svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                                <span class="widget-label">To-dos</span>
                                <button class="icon-btn widget-add-btn" data-action="open-add-todo" title="Add to-do">
                                    <svg viewBox="0 0 24 24" width="12" height="12"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                                </button>
                                <svg class="widget-chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
                            </div>
                            <div class="widget-body">
                                <div class="agenda-widget-filter" id="todos-filter">
                                    <button class="agenda-filter-btn active" data-filter="remaining" data-action="set-todo-filter">Remaining</button>
                                    <button class="agenda-filter-btn" data-filter="all" data-action="set-todo-filter">All</button>
                                    <button class="agenda-filter-btn" data-filter="completed" data-action="set-todo-filter">Completed</button>
                                </div>
                                <div class="agenda-widget-content" id="todos-widget-content">
                                    <div class="outline-empty">Loading...</div>
                                </div>
                            </div>
                        </div>

                        <!-- Events widget -->
                        <div class="panel-widget" data-widget-id="events" id="widget-events">
                            <div class="right-panel-section-header widget-header" data-action="toggle-widget-collapse" data-widget-id="events">
                                <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                                <span class="widget-label">Events</span>
                                <button class="icon-btn widget-add-btn" data-action="open-add-event" title="Add event">
                                    <svg viewBox="0 0 24 24" width="12" height="12"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                                </button>
                                <svg class="widget-chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
                            </div>
                            <div class="widget-body">
                                <div class="agenda-widget-content" id="events-widget-content">
                                    <div class="outline-empty">Loading...</div>
                                </div>
                            </div>
                        </div>

                        <!-- Quick Settings widget -->
                        <div class="panel-widget" data-widget-id="quick_settings" id="widget-quick_settings">
                            <div class="right-panel-section-header widget-header" data-action="toggle-widget-collapse" data-widget-id="quick_settings">
                                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                                <span class="widget-label">Quick Settings</span>
                                <svg class="widget-chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
                            </div>
                            <div class="widget-body">
                                <div class="quick-settings-content" id="quick-settings-content">
                                    <label class="quick-setting-toggle">
                                        <span>Dark mode</span>
                                        <input type="checkbox" id="qs-dark-mode" data-action="qs-toggle-dark-mode">
                                        <span class="qs-toggle-slider"></span>
                                    </label>
                                    <label class="quick-setting-toggle">
                                        <span>Preview mode</span>
                                        <input type="checkbox" id="qs-preview-mode" data-action="qs-toggle-mode">
                                        <span class="qs-toggle-slider"></span>
                                    </label>
                                    <label class="quick-setting-toggle">
                                        <span>Hide title</span>
                                        <input type="checkbox" id="qs-hide-title" data-action="qs-toggle-hide-title">
                                        <span class="qs-toggle-slider"></span>
                                    </label>
                                    <label class="quick-setting-toggle">
                                        <span>Collapse properties</span>
                                        <input type="checkbox" id="qs-props-collapsed" data-action="qs-toggle-props-collapsed">
                                        <span class="qs-toggle-slider"></span>
                                    </label>
                                    <label class="quick-setting-toggle">
                                        <span>Auto-save</span>
                                        <input type="checkbox" id="qs-auto-save" data-action="qs-toggle-auto-save">
                                        <span class="qs-toggle-slider"></span>
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
