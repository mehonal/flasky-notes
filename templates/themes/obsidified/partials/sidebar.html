        <!-- Sidebar -->
        <div class="sidebar {% if theme_settings and not theme_settings.sidebar_collapsed %}{% else %}collapsed{% endif %}" id="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-title">Notes</span>
                <div class="sidebar-actions">
                    <button class="icon-btn" data-action="new-folder" title="New folder" aria-label="New folder">
                        <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
                    </button>
                    <button class="icon-btn" data-action="create-new-note" title="New note" aria-label="New note">
                        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    </button>
                    <button class="icon-btn" data-action="close-sidebar" title="Close sidebar" aria-label="Close sidebar">
                        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                </div>
            </div>

            <div class="sidebar-search">
                <input type="text" id="search-input" placeholder="Filter..." data-action="filter-notes">
            </div>

            <div class="pinned-section" id="pinned-section">
                <div class="pinned-header">
                    <svg viewBox="0 0 24 24"><path d="M12 2L15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26z" fill="currentColor" stroke="none"/></svg>
                    Pinned
                </div>
                <div id="pinned-list"></div>
                <div class="pinned-divider"></div>
            </div>

            <div class="file-tree" id="file-tree">
                <div class="root-drop-zone" id="root-drop-zone" data-drop-target="root">
                    Drop here to move to root
                </div>
                {% with active_note_id = note.id if note else 0 %}
                {% include 'themes/obsidified/partials/sidebar_tree.html' %}
                {% endwith %}
            </div>

            <div class="sidebar-footer">
                <a href="/settings">Settings</a>
                <a href="/agenda">Agenda</a>
                <a href="/logout">Logout</a>
            </div>
        </div>
