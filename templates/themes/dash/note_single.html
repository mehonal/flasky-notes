{% set font = g.user.get_current_theme_font() %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="{{url_for('static',filename='images/amazing_logo.png')}}" type="image/x-icon">
    <link rel="stylesheet" href="{{url_for('static',filename='style/themes/dash/note_single.css')}}">
    <link rel="stylesheet" href="{{url_for('static',filename='css/callouts.css')}}">
    <link rel="manifest" href="/manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/2.0.3/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="{{url_for('static',filename='js/wikilinks.js')}}"></script>
    <script src="{{url_for('static',filename='js/markdown-extras.js')}}"></script>
    <title>{% if note and note.title %}{{note.title}} - {% endif %}Dash</title>
</head>
<body>
    <input type="hidden" id="note-id" value="{% if note %}{{note.id}}{% else %}0{% endif %}">
    <div id="menu">
        <button class="btn btn-menu" onclick="toggleTitle()" title="Toggle title (Ctrl+L)">📝<span class="hide-mobile"> Title</span></button>
        <button class="btn btn-menu" onclick="toggleMarkdown()" title="Toggle markdown (Ctrl+,)">📖<span class="hide-mobile"> Markdown</span></button>
        <button class="btn btn-menu" onclick="toggleDarkMode()" title="Toggle dark mode (Ctrl+Space)">🌙<span class="hide-mobile"> Dark</span></button>
        <button class="btn btn-menu" onclick="toggleNotes()" title="Toggle sidebar (Ctrl+Enter)">📂<span class="hide-mobile"> Notes</span></button>
        <button class="btn btn-menu" onclick="increaseFontSize()" title="Increase font (Ctrl+Up)">🔼</button>
        <button class="btn btn-menu" onclick="decreaseFontSize()" title="Decrease font (Ctrl+Down)">🔽</button>
        <button class="btn btn-menu" onclick="saveNote()" title="Save note (Ctrl+S)">💾<span class="hide-mobile"> Save</span></button>
        {% if note %}<button class="btn btn-menu" onclick="deleteNote()" title="Delete note (Ctrl+D)">🗑️<span class="hide-mobile"> Delete</span></button>{% endif %}
        <button class="btn btn-menu" onclick="FlaskySearch.open()" title="Search (Ctrl+K)">🔍<span class="hide-mobile"> Search</span></button>
        <button class="btn btn-menu" onclick="navigateToSettings()" title="Settings (Ctrl+Y)">⚙️<span class="hide-mobile"> Settings</span></button>
        <select class="btn" name="font-select" id="font-select" onchange="changeFont()">
            <option value="monospace" {% if font == "monospace" %}selected{% endif %}>Monospace</option>
            <option value="serif" {% if font == "serif" %}selected{% endif %}>Serif</option>
            <option value="sans-serif" {% if font == "sans-serif" %}selected{% endif %}>Sans Serif</option>
            <option value="Arial, sans-serif" {% if font == "Arial, sans-serif" %}selected{% endif %}>Arial</option>
            <option value="Brush Script MT, cursive" {% if font == "Brush Script MT, cursive" %}selected{% endif %}>Brush Script MT</option>
            <option value="Courier, monospace" {% if font == "Courier, monospace" %}selected{% endif %}>Courier</option>
            <option value="Courier New, monospace" {% if font == "Courier New, monospace" %}selected{% endif %}>Courier New</option>
            <option value="Georgia, serif" {% if font == "Georgia, serif" %}selected{% endif %}>Georgia</option>
            <option value="Ubuntu, sans-serif" {% if font == "Ubuntu, sans-serif" %}selected{% endif %}>Ubuntu</option>
            <option value="Times New Roman, serif" {% if font == "Times New Roman, serif" %}selected{% endif %}>Times New Roman</option>
            <option value="Trebuchet MS, sans-serif" {% if font == "Trebuchet MS, sans-serif" %}selected{% endif %}>Trebuchet MS</option>
        </select>
    </div>
    <div class="main">
    <div id="notes">
        <a href="/note/0" class="note new-note">
            + New Note
        </a>
        {% for nt in g.user.return_notes() %}
        <a class="note {% if note and note.id == nt.id %}current-note{% endif %}" href="/note/{{nt.id}}">
            {{nt.title}}
        </a>
        {% endfor %}
    </div>
    <div id="note-content">
        <input id="title" type="text" placeholder="Note Title..." {% if note and note.title %}value="{{note.title}}"{% endif %}>
        <textarea id="content" placeholder="Start writing..." style="font-size: {{font_size}}px;">{% if note and note.content %}{{note.content}}{% endif %}</textarea>
        <div id="content-markdown"></div>
    </div>
    </div>

    {% include 'partials/search_modal.html' %}

    <script src="{{url_for('static',filename='script/themes/dash/note_single.js')}}"></script>

    <script>
        {% if g.user.get_current_theme_dark_mode() == True %}
        toggleDarkMode();
        {% else %}
        darkModeOn = false;
        {% endif %}

        fontPreference = '{{font}}';
        updateFont(fontPreference);

        if (typeof loadNoteMap === 'function') loadNoteMap();
    </script>
</body>
</html>
