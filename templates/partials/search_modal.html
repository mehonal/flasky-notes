<!-- Search Modal — include in any theme, call FlaskySearch.open() to activate -->
<style>
.search-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 9999;
    justify-content: center;
    align-items: flex-start;
    padding-top: 15vh;
}
.search-overlay.active { display: flex; }
.search-modal {
    background: var(--search-bg, #fff);
    color: var(--search-text, #222);
    border-radius: 12px;
    width: 90%;
    max-width: 520px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}
.search-input-wrap {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    border-bottom: 1px solid var(--search-border, #e0e0e0);
    gap: 8px;
}
.search-input-wrap svg { opacity: 0.5; flex-shrink: 0; }
.search-input {
    flex: 1;
    border: none;
    outline: none;
    font-size: 16px;
    background: transparent;
    color: inherit;
}
.search-input::placeholder { color: var(--search-placeholder, #999); }
.search-results {
    max-height: 360px;
    overflow-y: auto;
    padding: 4px 0;
}
.search-results:empty::after {
    content: "Type to search notes...";
    display: block;
    padding: 24px 16px;
    text-align: center;
    opacity: 0.5;
    font-size: 14px;
}
.search-result-item {
    display: block;
    padding: 10px 16px;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    border-left: 3px solid transparent;
}
.search-result-item:hover,
.search-result-item.selected {
    background: var(--search-hover, #f0f0f0);
    border-left-color: var(--search-accent, #5b9bf5);
}
.search-result-title {
    font-weight: 600;
    font-size: 14px;
    margin-bottom: 2px;
}
.search-result-preview {
    font-size: 12px;
    opacity: 0.6;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.search-result-category {
    font-size: 11px;
    opacity: 0.45;
    margin-top: 2px;
}
.search-hints {
    padding: 8px 16px;
    font-size: 11px;
    opacity: 0.45;
    border-top: 1px solid var(--search-border, #e0e0e0);
    display: flex;
    gap: 16px;
}
.search-hints kbd {
    background: var(--search-kbd-bg, #e8e8e8);
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 11px;
    font-family: inherit;
}

/* Dark mode overrides */
body.dark-mode .search-modal,
.dark-mode .search-modal {
    --search-bg: #1e1e2e;
    --search-text: #cdd6f4;
    --search-border: #313244;
    --search-placeholder: #6c7086;
    --search-hover: #313244;
    --search-accent: #89b4fa;
    --search-kbd-bg: #313244;
}
</style>

<div class="search-overlay" id="searchOverlay" onclick="if(event.target===this)FlaskySearch.close()">
    <div class="search-modal">
        <div class="search-input-wrap">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" class="search-input" id="searchInput" placeholder="Search notes..." autocomplete="off">
        </div>
        <div class="search-results" id="searchResults"></div>
        <div class="search-hints">
            <span><kbd>&uarr;</kbd><kbd>&darr;</kbd> navigate</span>
            <span><kbd>Enter</kbd> open</span>
            <span><kbd>Esc</kbd> close</span>
        </div>
    </div>
</div>

<script>
var FlaskySearch = (function() {
    var overlay, input, results;
    var debounceTimer = null;
    var selectedIndex = -1;

    function init() {
        overlay = document.getElementById('searchOverlay');
        input = document.getElementById('searchInput');
        results = document.getElementById('searchResults');

        input.addEventListener('input', function() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(function() { search(input.value); }, 250);
        });

        input.addEventListener('keydown', function(e) {
            var items = results.querySelectorAll('.search-result-item');
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                selectedIndex = Math.min(selectedIndex + 1, items.length - 1);
                updateSelection(items);
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                selectedIndex = Math.max(selectedIndex - 1, 0);
                updateSelection(items);
            } else if (e.key === 'Enter' && selectedIndex >= 0 && items[selectedIndex]) {
                e.preventDefault();
                window.location = items[selectedIndex].getAttribute('href');
            } else if (e.key === 'Escape') {
                close();
            }
        });

        // Global Ctrl+K binding
        document.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                e.preventDefault();
                open();
            }
        });
    }

    function open() {
        overlay.classList.add('active');
        input.value = '';
        results.innerHTML = '';
        selectedIndex = -1;
        setTimeout(function() { input.focus(); }, 50);
    }

    function close() {
        overlay.classList.remove('active');
        input.value = '';
        results.innerHTML = '';
        selectedIndex = -1;
    }

    function search(query) {
        if (!query || query.length < 1) {
            results.innerHTML = '';
            selectedIndex = -1;
            return;
        }
        fetch('/api/search_notes', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query: query })
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            selectedIndex = -1;
            if (!data.notes || data.notes.length === 0) {
                results.innerHTML = '<div style="padding:24px 16px;text-align:center;opacity:0.5;font-size:14px">No results found</div>';
                return;
            }
            results.innerHTML = data.notes.map(function(note) {
                var preview = (note.content || '').substring(0, 120).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                var title = (note.title || 'Untitled').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                var catName = (note.category || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                var cat = catName ? '<div class="search-result-category">' + catName + '</div>' : '';
                return '<a class="search-result-item" href="/note/' + note.id + '">' +
                    '<div class="search-result-title">' + title + '</div>' +
                    '<div class="search-result-preview">' + preview + '</div>' +
                    cat + '</a>';
            }).join('');
        })
        .catch(function() {
            results.innerHTML = '<div style="padding:24px 16px;text-align:center;opacity:0.5">Search error</div>';
        });
    }

    function updateSelection(items) {
        items.forEach(function(el, i) {
            el.classList.toggle('selected', i === selectedIndex);
        });
        if (items[selectedIndex]) {
            items[selectedIndex].scrollIntoView({ block: 'nearest' });
        }
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }

    return { open: open, close: close };
})();
</script>
